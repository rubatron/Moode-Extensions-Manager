# moOde Extension Manager Development Environment
#
# Usage:
#   Default (NGINX + PHP-FPM - matches moOde production):
#     docker compose up --build
#
#   Apache variant (simpler, for quick testing):
#     docker compose --profile apache up --build
#
# Access:
#   Extension Manager: http://localhost:8080/ext-mgr.php
#   moOde index:       http://localhost:8080/

services:
  # Default: NGINX + PHP-FPM (matches moOde production stack)
  moode-nginx:
    build:
      context: .
      dockerfile: docker/nginx-fpm/Dockerfile
    container_name: moode-dev
    ports:
      - "8080:80"
    volumes:
      # Mount source for live development
      - ./:/ext-mgr-src:ro
      # Persistent extensions storage
      - moode-extensions:/var/www/extensions
      # Persistent database
      - moode-db:/var/local/www/db
    environment:
      - PHP_DISPLAY_ERRORS=1
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost/ext-mgr.php" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # Alternative: Apache (simpler, for quick testing)
  moode-apache:
    build:
      context: .
      dockerfile: docker/apache/Dockerfile
    container_name: moode-dev-apache
    profiles:
      - apache
    ports:
      - "8080:80"
    volumes:
      - ./:/ext-mgr-src:ro
      - moode-extensions:/var/www/extensions
      - moode-db:/var/local/www/db
    environment:
      - PHP_DISPLAY_ERRORS=1
    restart: unless-stopped

volumes:
  moode-extensions:
  moode-db:
